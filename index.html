<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightreach Pulse Commission Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1A2A44;
            color: #fff;
        }
        .calculator {
            background: #2E4057;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #F28C38;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #4A6280;
            border-radius: 4px;
            background-color: #34495E;
            color: #fff;
        }
        button {
            background-color: #F28C38;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #4A6280;
            padding: 10px;
        }
        th {
            background-color: #34495E;
        }
        .output-group { display:none; }
        .output-group.show { display:block; }
    </style>
</head>
<body>

<div class="calculator">
    <h1>Lightreach Pulse Commission Calculator</h1>

    <div class="grid">
        <div>
            <label>Sales Price (PPW)</label>
            <input type="number" id="salesPrice">
        </div>

        <div>
            <label>Redline (PPW)</label>
            <input type="number" id="redline">
        </div>

        <div>
            <label>Modules</label>
            <select id="mods">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50">50</option>
                <option value="60">60</option>
                <option value="70">70</option>
                <option value="75">75</option>
            </select>
        </div>

        <!-- 🔥 NEW Expansion Quantity -->
        <div>
            <label>Expansion Quantity ($10,000 each)</label>
            <input type="number" id="expansionQty" value="0" min="0">
        </div>
    </div>

    <button onclick="calculate()">Calculate</button>

    <div class="output-group" id="output">
        <table>
            <tr><th>Metric</th><th>Value</th></tr>
            <tr><td>System Size</td><td id="systemSize"></td></tr>
            <tr><td>PW3 Count</td><td id="pw3Count"></td></tr>
            <tr><td>Base PPW</td><td id="basePPW"></td></tr>
            <tr><td>EPC PPW</td><td id="epcPPW"></td></tr>
            <tr><td>Total Commission</td><td id="totalCommission"></td></tr>
        </table>
    </div>
</div>

<script>
const pricingMatrix = [{"mods":10,"watts":4050,"basePPW":3.02963,"pw3Count":1},{"mods":20,"watts":8100,"basePPW":1.939506,"pw3Count":1},{"mods":30,"watts":12150,"basePPW":1.576132,"pw3Count":1},{"mods":40,"watts":16200,"basePPW":1.394444,"pw3Count":1},{"mods":50,"watts":20250,"basePPW":1.678765,"pw3Count":2},{"mods":60,"watts":24300,"basePPW":1.540535,"pw3Count":2},{"mods":70,"watts":28350,"basePPW":1.441799,"pw3Count":2},{"mods":75,"watts":30375,"basePPW":1.402831,"pw3Count":2}];

function getPricing(mods) {
    return pricingMatrix.find(p => p.mods === mods);
}

function formatCurrency(val) {
    return "$" + val.toLocaleString(undefined, {minimumFractionDigits:2});
}

function calculate() {
    const salesPrice = parseFloat(document.getElementById('salesPrice').value);
    const redline = parseFloat(document.getElementById('redline').value);
    const mods = parseInt(document.getElementById('mods').value);
    const expansionQty = parseInt(document.getElementById('expansionQty').value) || 0;

    if ([salesPrice, redline, mods].some(isNaN)) {
        alert("Enter valid inputs");
        return;
    }

    const pricing = getPricing(mods);

    const systemSize = pricing.watts;
    const epcPPW = pricing.basePPW + redline;

    // 🔥 Expansion logic
    const expansionBonus = expansionQty * 10000;

    const totalCommission = ((salesPrice - epcPPW) * systemSize) + expansionBonus;

    document.getElementById('systemSize').textContent = systemSize.toLocaleString();
    document.getElementById('pw3Count').textContent = pricing.pw3Count;
    document.getElementById('basePPW').textContent = pricing.basePPW.toFixed(4);
    document.getElementById('epcPPW').textContent = epcPPW.toFixed(4);
    document.getElementById('totalCommission').textContent = formatCurrency(totalCommission);

    document.getElementById('output').classList.add('show');
}
</script>

</body>
</html>
